name: CI/CD — Sales Service

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"

env:
  IMAGE_NAME: cristianbatista/sales-service
  PYTHON_VERSION: "3.11"

# ─────────────────────────────────────────────────────────────
# JOBS DE PR:   lint → test → build-image (validação, sem push)
# JOBS DE MAIN: lint → test → publish-image (tag: main + SHA)
# JOBS DE TAG:  lint → test → publish-image → deploy
# ─────────────────────────────────────────────────────────────

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (check mode)
        run: ruff check src/ tests/

      - name: Run black (check mode)
        run: black --check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: sales
          POSTGRES_PASSWORD: sales
          POSTGRES_DB: sales
        options: >-
          --health-cmd "pg_isready -U sales -d sales"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://sales:sales@localhost:5432/sales
      JWT_SECRET_KEY: test-secret
      JWT_ALGORITHM: HS256
      CATALOG_SERVICE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: PYTHONPATH=src alembic upgrade head

      - name: Run tests
        run: PYTHONPATH=src pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build-image:
    name: Build Docker Image (PR validation)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # Publish e Deploy: somente em push de tag
  # ─────────────────────────────────────────────────────────────

  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: cristianbatista
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,format=short,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy — Kubernetes (kind)
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Set up kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: sales-ci
          wait: 120s

      - name: Build and load image into kind
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          kind load docker-image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --name sales-ci

      - name: Deploy PostgreSQL
        run: |
          kubectl create namespace sales
          kubectl apply -n sales -f - <<'EOF'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres
          spec:
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                  - name: postgres
                    image: postgres:16-alpine
                    ports:
                      - containerPort: 5432
                    env:
                      - name: POSTGRES_USER
                        value: sales
                      - name: POSTGRES_PASSWORD
                        value: sales
                      - name: POSTGRES_DB
                        value: sales
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres
          spec:
            selector:
              app: postgres
            ports:
              - port: 5432
                targetPort: 5432
          EOF

      - name: Wait for PostgreSQL rollout
        run: kubectl rollout status deployment/postgres -n sales --timeout=120s

      - name: Run Alembic migrations
        run: |
          kubectl run alembic-migrate -n sales --restart=Never \
            --image=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --image-pull-policy=Never \
            --env="DATABASE_URL=postgresql+asyncpg://sales:sales@postgres:5432/sales" \
            --env="JWT_SECRET_KEY=kind-ci-secret" \
            --env="JWT_ALGORITHM=HS256" \
            --env="CATALOG_SERVICE_URL=http://localhost:8000" \
            -- python -m alembic upgrade head
          kubectl wait --for=condition=Ready pod/alembic-migrate -n sales --timeout=60s || true
          kubectl logs alembic-migrate -n sales || true

      - name: Deploy Sales Service
        run: |
          kubectl create secret generic sales-secrets -n sales \
            --from-literal=JWT_SECRET_KEY=kind-ci-secret \
            --from-literal=JWT_ALGORITHM=HS256

          kubectl apply -n sales -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: sales-service
          spec:
            selector:
              matchLabels:
                app: sales-service
            template:
              metadata:
                labels:
                  app: sales-service
              spec:
                initContainers:
                  - name: wait-for-postgres
                    image: busybox:1.36
                    command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
                containers:
                  - name: sales-service
                    image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                    imagePullPolicy: Never
                    ports:
                      - containerPort: 8001
                    env:
                      - name: DATABASE_URL
                        value: "postgresql+asyncpg://sales:sales@postgres:5432/sales"
                      - name: CATALOG_SERVICE_URL
                        value: "http://localhost:8000"
                      - name: JWT_SECRET_KEY
                        valueFrom:
                          secretKeyRef:
                            name: sales-secrets
                            key: JWT_SECRET_KEY
                      - name: JWT_ALGORITHM
                        valueFrom:
                          secretKeyRef:
                            name: sales-secrets
                            key: JWT_ALGORITHM
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 8001
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      failureThreshold: 6
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: sales-service
          spec:
            selector:
              app: sales-service
            ports:
              - port: 8001
                targetPort: 8001
          EOF

      - name: Wait for Sales Service rollout
        run: kubectl rollout status deployment/sales-service -n sales --timeout=120s

      - name: Health check via port-forward
        run: |
          kubectl port-forward svc/sales-service 8001:8001 -n sales &
          sleep 3
          curl --fail --retry 5 --retry-delay 3 http://localhost:8001/health

      - name: Show pod logs on failure
        if: failure()
        run: |
          echo "=== sales-service logs ==="
          kubectl logs -l app=sales-service -n sales --tail=50 || true
          echo "=== postgres logs ==="
          kubectl logs -l app=postgres -n sales --tail=20 || true
